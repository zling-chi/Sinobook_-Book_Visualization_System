<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>登录 - 高校教材数据分析系统</title>
    <style>
        body {
            /* 1. 修正路径：增加 background 子文件夹，并确保文件名与后缀正确 */
            background: url("{{ url_for('static', filename='images/background/background.webp') }}") no-repeat center center fixed;
            background-size: cover;

            /* 2. 居中核心代码 */
            display: flex; 
            justify-content: center; /* 水平居中 */
            align-items: center;     /* 垂直居中 */
            height: 100vh;           /* 占据整个浏览器高度 */
            margin: 0;               /* 去除边距，防止出现滚动条 */
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .login-card { 
            background: rgba(255, 255, 255, 0.9); /* 增加一点透明度，让背景隐约透出来更高级 */
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.3); 
            width: 360px; 
        }

        .login-card h2 { text-align: center; color: #00838F; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #d9d9d9; border-radius: 4px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #006064; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        button { width: 100%; padding: 12px; background: #0097A7; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #006064; }
        .footer { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .footer a { color: #00838F; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>系统登录</h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit">登录</button>
        </form>
        <div class="footer">
            还没有账号？ <a href="/register">立即注册</a>
        </div>
        <div class="footer" style="margin-top: 10px;">
            <a href="/" style="color: #999; font-size: 13px;">👁 以游客身份浏览可视化数据</a>
        </div>
    </div>
</body>
</html>
